name: Yandex Disk Sync

on:
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests imap-tools; fi

      - name: Run script
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          YANDEX_TOKEN: ${{ secrets.YANDEX_TOKEN }}
          TARGET_NOTIFICATION: ${{ secrets.TARGET_NOTIFICATION }}
          SENDER_FILTER: ${{ secrets.SENDER_FILTER }}
        run: python main.py
